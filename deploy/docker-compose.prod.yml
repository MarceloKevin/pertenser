# PertenSer — Produção (VPS)
# Uso no servidor: /opt/pertenser/docker-compose.prod.yml
#
# Pré-requisitos:
#   - Repositórios backend/ e frontend/ clonados ao lado deste arquivo
#   - Arquivo .env preenchido (copie de .env.example)
#   - Certificados SSL gerados (./scripts/init-ssl.sh)

name: pertenser

services:
  db:
    image: postgres:16-alpine
    container_name: pertenser-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: projetopertenser
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projetopertenser"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pertenser

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pertenser-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/projetopertenser?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-5}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@pertenser.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - pertenser

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pertenser-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      BACKEND_URL: http://pertenser-api:4000
      NODE_ENV: production
    volumes:
      - eventos_uploads:/app/public/eventos
    networks:
      - pertenser

  nginx:
    image: nginx:1.27-alpine
    container_name: pertenser-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
    networks:
      - pertenser

  certbot:
    image: certbot/certbot:latest
    container_name: pertenser-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renovação automática — executar via cron no host (ver scripts/renew-ssl.sh)
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    networks:
      - pertenser

volumes:
  postgres_data:
  uploads_data:
  eventos_uploads:

networks:
  pertenser:
    driver: bridge
