# Fase 1 — apenas HTTP (para obter certificados com Certbot)
# Ativo somente durante a inicialização. Depois use pertenser-ssl.conf.

server {
    listen 80;
    listen [::]:80;
    server_name www.pertenser.com.br pertenser.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://pertenser-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
