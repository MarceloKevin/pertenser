services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pertenser-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://pertenser-api:4000}
      NODE_ENV: production
    env_file:
      - path: .env
        required: false
    volumes:
      - eventos_uploads:/app/public/eventos
    networks:
      - pertenser

volumes:
  eventos_uploads:

networks:
  pertenser:
    external: true
    name: backend_pertenser